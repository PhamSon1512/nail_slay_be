# ═══════════════════════════════════════════════════════════════════════════════
# TECHNIQUES INDEX - Central Registry for All Prompting Techniques
# ═══════════════════════════════════════════════════════════════════════════════
# 
# DESIGN PRINCIPLES:
# 1. Single source of truth - add new techniques here only
# 2. Lightweight - contains metadata, not full content
# 3. Smart matching - keywords enable auto-recommendation
# 4. Scalable - just add entries, no other files to update
#
# USAGE:
# - Load this file as core knowledge base (mandatory)
# - Use keywords to match user requirements → recommend techniques
# - Load detailed file ONLY when user asks for deep-dive/examples
#
# ═══════════════════════════════════════════════════════════════════════════════

index:
  version: "2.0.0"
  total_techniques: 29  # Added 6 new 2025-2026 techniques
  base_path: "./"  # Relative path within skill directory
  
  # ═══════════════════════════════════════════════════════════════════════════
  # HOW TO USE THIS INDEX
  # ═══════════════════════════════════════════════════════════════════════════
  usage:
    for_recommendation: |
      1. Analyze user's task description
      2. Match against 'keywords' and 'triggers' fields
      3. Return matching techniques sorted by 'rank'
      4. Show 'quick_tip' for immediate help
      
    for_deep_dive: |
      1. User asks for detailed explanation
      2. Load the 'file' for that technique
      3. Present full content including world-class examples
      
    for_prompt_creation: |
      1. During ARCHITECT phase, scan all techniques
      2. Auto-suggest based on requirements gathered in DISCOVERY
      3. Include selected techniques' patterns in final prompt

